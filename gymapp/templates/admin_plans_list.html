{% extends 'base.html' %}


{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Membership Plans</h2>
    <a href="{% url 'admin_plan_add' %}" class="btn btn-primary">Add New Plan</a>
</div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Plan Name</th>
                <th>Duration(month)</th>
                <th>Plan Fee</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for plan in plans %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ plan.name }}</td>
                <td>{{ plan.duration_months }}</td>
                <td>{{ plan.fee }}</td>
                <td>
                    <a href="{% url 'admin_plan_edit' plan.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <form method="POST" action="{% url 'admin_plan_delete' plan.id %}" style="display: inline-block;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this plan?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock %}
