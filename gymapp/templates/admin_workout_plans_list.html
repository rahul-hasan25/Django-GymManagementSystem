{% extends 'base.html' %}


{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Workout Plans</h2>
    <a href="{% url 'admin_workout_plan_add' %}" class="btn btn-primary">Add Workout Plan</a>
</div>

<form method="GET" class="row g-2 mb-3">
    <div class="col-md-4">
        <select name="member_id" class="form-select">
            <option value="">All Members</option>
            {% for member in members %}
                <option value="{{ member.id }}" {% if member.id|stringformat:"s" == selected_member_id %}selected{% endif %}> {{ member.full_name }} </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-4">
        <button type="submit" class="btn btn-secondary">Search</button>
    </div>
</form>

<div class="row g-3">
    {% for wp in workout_plans %}
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span>{{ wp.title }}</span>
                    <small>{{ wp.member.full_name }}</small>
                </div>

                <div class="card-body">
                    <p class="small text-muted mb-1">{{ wp.created_at }}</p>
                    <p style="white-space: pre-line;"> {{ wp.description }} </p>

                    <form method="post" action="{% url 'admin_workout_plan_delete' wp.id %}" onsubmit="return confirm('Delete this workout plan?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
