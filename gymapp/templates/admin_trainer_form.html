{% extends 'base.html' %}


{% block content %}

<h2 class="mb-3">
    {% if mode == 'add' %} Add Trainer {% else %} Edit Trainer {% endif %}
</h2>

<form method="POST" class="row g-3 w-75">
    {% csrf_token %}
    <div class="col-md-6">
        <label for="name" class="form-label">Trainer Name</label>
        <input type="text" id="name" class="form-control" name="name" value="{{ trainer.name | default:'' }}" placeholder="Enter Trainer Name">
    </div>

    <div class="col-md-6">
        <label for="mobile" class="form-label">Mobile</label>
        <input type="number" id="mobile" class="form-control" name="mobile" value="{{ trainer.mobile | default:'' }}" maxlength="11" placeholder="Enter Trainer Number">
    </div>

    <div class="col-md-6">
        <label for="specialization" class="form-label">Specialization</label>
        <input type="text" id="specialization" class="form-control" name="specialization" placeholder="Enter Specialization" value="{{ trainer.specialization | default:'' }}">
    </div>

    <div class="col-md-6">
        <label for="shift_timings" class="form-label">Shift Timing</label>
        <input type="text" id="shift_timings" class="form-control" name="shift_timings" rows="3" value="{{ trainer.shift_timings | default:'' }}" placeholder="e.g. 6AM - 8AM">
    </div>

    <div class="col-md-12">
        <button type="submit" class="btn btn-primary">
            {% if mode == 'add' %} Add Trainer {% else %} Update Trainer {% endif %}
        </button>
        <a href="{% url 'admin_trainers_list' %}" class="btn btn-secondary"> Cancel </a>
    </div>
</form>

{% endblock %}
