{% extends 'base.html' %}


{% block content %}

<h2 class="mb-3">
    {% if mode == 'add' %} Add Member {% else %} Edit Member {% endif %}
</h2>

<form method="POST" class="row g-3 w-75">
    {% csrf_token %}
    {% if mode == 'add' %}
        <div class="col-md-6">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-control" name="username" placeholder="Enter Member Username" required>
        </div>

        <div class="col-md-6">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="form-control" name="password" placeholder="Enter Member Password" required>
        </div>
    {% endif %}

    <div class="col-md-6">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" id="full_name" class="form-control" name="full_name" value="{{ member.full_name | default:'' }}" placeholder="Enter Full Name">
    </div>

    <div class="col-md-3">
        <label for="mobile" class="form-label">Mobile</label>
        <input type="number" id="mobile" class="form-control" name="mobile" value="{{ member.mobile | default:'' }}" maxlength="11" placeholder="Enter Mobile Number">
    </div>

    <div class="col-md-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" id="age" class="form-control" name="age" placeholder="Enter Age" value="{{ member.age | default:'' }}">
    </div>

    <div class="col-md-3">
        <label for="gender" class="form-label">Gender</label>
        <select name="gender" id="gender" class="form-select">
            <option value="">Select Gender</option>
            <option value="Male" {% if member.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if member.gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if member.gender == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>

    <div class="col-md-3">
        <label for="join_date" class="form-label">Join Date</label>
        <input type="date" id="join_date" class="form-control" name="join_date" value="{{ member.join_date | date:'Y-m-d' }}">
    </div>

    <div class="col-md-6">
        <label for="address" class="form-label">Address</label>
        <textarea name="address" id="address" class="form-control" rows="1">{{ member.address | default:'' }}</textarea>
    </div>

    <div class="col-md-6">
        <label for="plan_id" class="form-label">Membership Plan</label>
        <select name="plan_id" id="plan_id" class="form-select">
            <option value="">No Plan</option>
            {% for plan in plans %}
                <option value="{{plan.id}}" {% if member.plan.id == plan.id %}selected{% endif %}>
                    {{plan.name}} ({{plan.duration_months}} month - {{plan.fee}} Taka)
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-6">
        <label for="trainer_id" class="form-label">Trainer</label>
        <select name="trainer_id" id="trainer_id" class="form-select">
            <option value="">No Trainer</option>
            {% for trainer in trainers %}
                <option value="{{trainer.id}}" {% if member.trainer.id == trainer.id %}selected{% endif %}>
                    {{trainer.name}} - {{trainer.specialization}}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-12">
        <button type="submit" class="btn btn-primary">
            {% if mode == 'add' %} Add Member {% else %} Update Member {% endif %}
        </button>
        <a href="{% url 'admin_members_list' %}" class="btn btn-secondary"> Cancel </a>
    </div>
</form>

{% endblock %}
